services:
  ocha-cms:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - .env.local
    volumes:
      - ocha-data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ocha-data:/data:ro
    depends_on:
      - ocha-cms
    restart: unless-stopped

volumes:
  ocha-data:
